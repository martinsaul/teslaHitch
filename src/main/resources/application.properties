spring.application.name=teslaHitch
spring.config.import=optional:configtree:/run/secrets/

server.port=8080
server.ssl.certificate=${tesla.config.dir}/tls-cert.pem
server.ssl.certificate-private-key=${tesla.config.dir}/tls-key.pem
server.trustedPort=8000
server.trustedPathPrefix=/internal/

# External hostname for Tesla OAuth callback (added to TLS cert SAN)
tesla.callback.hostname=${TESLA_CALLBACK_HOSTNAME:tesla.zenithnetwork.com}

# Tesla OAuth - loaded from Docker secrets at /run/secrets/
# Fallbacks allow running outside Docker with env vars
tesla.oauth.clientId=${tesla.oauth.clientId:}
tesla.oauth.clientSecret=${tesla.oauth.clientSecret:}
tesla.oauth.redirectUri=${tesla.oauth.redirectUri:}

# Config directory for generated certs and auth state
tesla.config.dir=${TESLA_CONFIG_DIR:/config}

# Tesla HTTP proxy URL (internal, for teslahitch -> proxy communication)
tesla.proxy.url=${TESLA_PROXY_URL:https://localhost:4443}

# Tesla HTTP proxy URL (external, for HA -> proxy via Traefik)
tesla.proxy.external.url=${TESLA_PROXY_EXTERNAL_URL:https://teslaproxy.home.zenithnetwork.com}
